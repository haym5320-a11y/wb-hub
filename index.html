<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WB Дашборды — ИП Логинова</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#1f3864;overflow:hidden}
.tabs{display:flex;gap:6px;align-items:center;padding:8px 14px;height:50px;background:#1f3864;overflow-x:auto}
.tabs .brand{color:#fff;font-weight:700;font-size:15px;margin-right:16px;white-space:nowrap}
.tab{padding:9px 18px;border:none;border-radius:9px 9px 0 0;background:#2e5496;color:#cdd9ef;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{background:#3a62a6;color:#fff}
.tab.active{background:#eef1f6;color:#1f3864}
.frames{position:fixed;top:50px;left:0;right:0;bottom:0;background:#eef1f6}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
#lock{position:fixed;inset:0;background:#1f3864;display:flex;align-items:center;justify-content:center;z-index:99999}
#lock .box{background:#fff;padding:30px 32px;border-radius:14px;width:300px;text-align:center}
#lock input{width:100%;padding:9px;border:1px solid #cdd5e0;border-radius:8px;font-size:14px;text-align:center}
#lock button{margin-top:8px;width:100%;padding:10px;background:#2e5496;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
</style></head><body>
<div id="lock"><div class="box">
<div style="font-size:30px">&#128274;</div>
<div style="font-size:17px;font-weight:700;margin:8px 0 4px">WB Дашборды</div>
<div style="color:#789;font-size:12px;margin-bottom:14px">Введите пароль для доступа</div>
<input id="pw" type="password" placeholder="Пароль">
<div id="er" style="color:#c00;font-size:12px;height:16px;margin-top:6px"></div>
<button id="go">Открыть</button>
</div></div>
<div class="tabs">
<span class="brand">WB · ИП Логинова</span>
<button class="tab active" data-i="0">Заказы · остатки · прибыль</button>
<button class="tab" data-i="1">Реклама · РК</button>
<button class="tab" data-i="2">Цены</button>
<button class="tab" data-i="3">Воронка продаж</button>
</div>
<div class="frames">
<iframe class="active" data-src="https://haym5320-a11y.github.io/wb-dashboard/" loading="eager"></iframe>
<iframe data-src="https://haym5320-a11y.github.io/wb-rk-dashboard/"></iframe>
<iframe data-src="https://haym5320-a11y.github.io/wb-price-dashboard/"></iframe>
<iframe data-src="https://haym5320-a11y.github.io/wb-drops-dashboard/"></iframe>
</div>
<script>
const ENC={"salt": "ohSOJ6pUT00lZPTXy5ByRw==", "iv": "m8mxhHJgRF7I5Kyj", "ct": "bHsvd62jsalG5/jr+dPKAPQOy9Xx", "it": 200000}, LSK='wb_dash_pw';
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function check(pw){
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ENC.iv)},key,b64d(ENC.ct));
 return new TextDecoder().decode(pt)==='wb-ok';
}
const tabs=[...document.querySelectorAll('.tab')],frames=[...document.querySelectorAll('iframe')];
tabs.forEach(t=>t.onclick=()=>{const i=+t.dataset.i;
  tabs.forEach(x=>x.classList.toggle('active',x===t));
  frames.forEach((f,j)=>{f.classList.toggle('active',j===i); if(j===i&&!f.src)f.src=f.dataset.src;});});
function enter(){document.getElementById('lock').style.display='none';
  frames.forEach((f,j)=>{ if(j===0||f.classList.contains('active')) f.src=f.dataset.src; });
  // остальные подгрузятся при первом клике на вкладку (см. onclick), но можно прелоуд:
  frames.forEach(f=>{ if(!f.src) f.src=f.dataset.src; });}
async function submit(){const pw=document.getElementById('pw').value;document.getElementById('er').textContent='Проверяю…';
 try{ if(await check(pw)){ try{localStorage.setItem(LSK,pw);}catch(e){} enter(); } else document.getElementById('er').textContent='Неверный пароль'; }
 catch(e){ document.getElementById('er').textContent='Неверный пароль'; }}
document.getElementById('go').onclick=submit;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
(async()=>{ try{ var pw=localStorage.getItem(LSK); if(pw&&await check(pw)){ enter(); return; } }catch(e){}
  document.getElementById('pw').focus(); })();
</script></body></html>
